<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>베이직 모드 - 통합 설문</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .progress-container { width: 100%; max-width: 800px; margin-top: 50px; padding: 0 20px; box-sizing: border-box; }
        .progress-bar-bg { width: 100%; height: 6px; background-color: #333; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { width: 25%; height: 100%; background-color: var(--accent-color); transition: width 0.4s ease; }
        .progress-text { text-align: right; font-size: 0.85rem; color: var(--accent-color); margin-top: 8px; font-weight: 600; }

        .question-header { text-align: center; margin: 60px 0 35px; padding: 0 20px; }
        .question-step { color: var(--accent-color); font-size: 1rem; font-weight: 600; letter-spacing: 2px; margin-bottom: 10px; }
        .question-title { font-size: 2rem; font-weight: 700; margin: 0; }
        .question-desc { font-size: 0.95rem; color: var(--text-sub); margin-top: 10px; }

        .options-container { display: flex; gap: 20px; max-width: 900px; width: 100%; padding: 0 20px; box-sizing: border-box; flex-wrap: wrap; justify-content: center; }
        .option-card { flex: 1; min-width: 250px; background-color: var(--card-bg); border: 2px solid #333; border-radius: 12px; padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .option-card:hover { border-color: #555; background-color: var(--hover-bg); }
        .option-card.selected { border-color: var(--accent-color); background-color: var(--selected-bg); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .option-icon { font-size: 2.5rem; margin-bottom: 15px; }
        .option-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
        .option-desc { font-size: 0.95rem; color: var(--text-sub); line-height: 1.5; }

        .sub-question-container { margin-top: 45px; text-align: center; max-width: 820px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .sub-question-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; border-top: 1px solid #333; padding-top: 35px; }
        .volume-options { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .volume-btn { padding: 12px 25px; background-color: var(--card-bg); border: 1px solid #444; border-radius: 30px; color: var(--text-sub); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .volume-btn:hover { border-color: #888; color: #fff; }
        .volume-btn.selected { background-color: var(--accent-color); color: var(--bg-color); border-color: var(--accent-color); }

        .nav-container { margin: 45px 0 50px; display: flex; gap: 15px; }
        .prev-btn { padding: 15px 30px; background-color: transparent; color: var(--text-sub); border: 1px solid #555; border-radius: 30px; font-size: 1.05rem; font-weight: 600; cursor: pointer; }
        .prev-btn:hover { background-color: #333; color: #fff; }
        .next-btn { padding: 15px 50px; background-color: #333; color: #888; border: none; border-radius: 30px; font-size: 1.05rem; font-weight: 600; cursor: not-allowed; transition: all 0.3s ease; }
        .next-btn.active { background-color: var(--accent-color); color: var(--bg-color); cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal-content { background-color: var(--card-bg); border: 1px solid #444; border-radius: 12px; width: 90%; max-width: 450px; padding: 40px 30px; box-sizing: border-box; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; color: #888; font-size: 1.5rem; cursor: pointer; border: none; background: none; }
        .modal-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 10px 0; color: #fff; }
        .modal-desc { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 25px; line-height: 1.4; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #ccc; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px 15px; box-sizing: border-box; background-color: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 1rem; }
        .submit-btn { width: 100%; padding: 15px; margin-top: 10px; background-color: var(--accent-color); color: var(--bg-color); border: none; border-radius: 8px; font-size: 1.05rem; font-weight: 700; cursor: pointer; }

        .loading-view {
            width: 100%;
            max-width: 780px;
            min-height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px 60px;
            box-sizing: border-box;
        }
        .spinner-container { position: relative; width: 100px; height: 100px; margin-bottom: 30px; }
        .circle {
            position: absolute; width: 100%; height: 100%;
            border: 3px solid transparent; border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        .circle:nth-child(2) { width: 80%; height: 80%; top: 10%; left: 10%; border-top-color: #888; animation-duration: 2s; animation-direction: reverse; }
        .circle:nth-child(3) { width: 60%; height: 60%; top: 20%; left: 20%; border-top-color: #555; animation-duration: 1s; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loading-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .loading-text {
            font-size: 1.05rem;
            color: var(--accent-color);
            font-weight: 600;
            min-height: 30px;
            margin-bottom: 30px;
            transition: opacity 0.3s ease;
        }
        .cursor::after { content: '|'; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .data-panel {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .panel-title { font-size: 0.85rem; color: #888; margin-bottom: 15px; letter-spacing: 1px; text-align: left; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .data-tag {
            background-color: #222;
            border: 1px solid #444;
            color: #ccc;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.5s forwards;
        }
        .data-tag:nth-child(1) { animation-delay: 0.2s; }
        .data-tag:nth-child(2) { animation-delay: 0.6s; }
        .data-tag:nth-child(3) { animation-delay: 1.0s; }
        .data-tag:nth-child(4) { animation-delay: 1.4s; }
        .data-tag:nth-child(5) { animation-delay: 1.8s; }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); border-color: var(--accent-color); color: #fff; }
        }
        .progress-percentage {
            margin-top: 30px;
            font-size: 2.5rem;
            font-weight: 700;
            color: #444;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div class="progress-container" id="surveyProgress">
        <div class="progress-bar-bg"><div id="progressFill" class="progress-bar-fill"></div></div>
        <div id="progressText" class="progress-text"></div>
    </div>

    <div class="question-header" id="surveyHeader">
        <div id="questionStep" class="question-step"></div>
        <h2 id="questionTitle" class="question-title"></h2>
        <p id="questionDesc" class="question-desc"></p>
    </div>

    <div id="optionsContainer" class="options-container"></div>

    <div id="volumeSection" class="sub-question-container" style="display:none;">
        <h3 class="sub-question-title">월평균 원두 사용량을 알려주시면 맞춤 단가를 계산해 드립니다.</h3>
        <div class="volume-options">
            <button type="button" class="volume-btn" data-volume="under_10">10kg 미만</button>
            <button type="button" class="volume-btn" data-volume="10_to_30">10kg ~ 30kg</button>
            <button type="button" class="volume-btn" data-volume="over_30">30kg 이상 (대용량 단가)</button>
        </div>
    </div>

    <div class="nav-container" id="surveyNav">
        <button id="prevBtn" class="prev-btn" type="button">이전 단계</button>
        <button id="nextBtn" class="next-btn" type="button" disabled>다음 단계로</button>
    </div>
    <p id="submitStatus" class="question-desc" aria-live="polite" style="min-height: 24px; margin-top: -30px;"></p>

    <div id="loadingView" class="loading-view" aria-live="polite">
        <div class="spinner-container">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        <div class="loading-title">AI 로스팅 프로파일 설계 중</div>
        <div id="loadingText" class="loading-text cursor">매장 데이터를 수집 중입니다...</div>
        <div class="data-panel">
            <div class="panel-title">수집된 분석 파라미터 (Parameters)</div>
            <div class="tag-container" id="tagContainer"></div>
        </div>
        <div class="progress-percentage" id="loadingPercent">0%</div>
    </div>

    <div id="leadModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="leadModalTitle">
        <div class="modal-content">
            <button class="modal-close" type="button" id="modalCloseBtn">&times;</button>
            <h3 id="leadModalTitle" class="modal-title">맞춤형 R&D 설계 준비</h3>
            <p class="modal-desc">정확한 프로파일 분석과 샘플 배송을 위해 대표님 정보를 확인합니다.</p>
            <form id="leadForm">
                <div class="form-group">
                    <label for="userName">대표자 성함 / 상호명</label>
                    <input type="text" id="userName" autocomplete="organization" required>
                </div>
                <div class="form-group">
                    <label for="userPhone">연락처 (휴대전화)</label>
                    <input type="tel" id="userPhone" autocomplete="tel" required>
                </div>
                <div class="form-group">
                    <label for="userEmail">이메일</label>
                    <input type="email" id="userEmail" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="businessAddress">사업장 주소</label>
                    <input type="text" id="businessAddress" autocomplete="street-address" required>
                </div>
                <div class="form-group">
                    <label for="businessNumber">사업자 등록번호</label>
                    <input type="text" id="businessNumber" maxlength="12" required>
                </div>
                <button type="submit" class="submit-btn">정보 저장하고 계속하기</button>
            </form>
        </div>
    </div>

    <script src="assets/common.js"></script>
    <script>
        const steps = [
            {
                key: 'step1_target',
                stepText: 'QUESTION 01',
                progressText: 'STEP 1 / 4 : 매장 환경 분석',
                title: '우리 매장을 가장 자주 찾는 단골손님은?',
                desc: '',
                nextLabel: '다음 단계로',
                options: [
                    { value: 'office', icon: '🏢', title: '바쁜 출근길 직장인', desc: '카페인 충전이 필수! 호불호 없이 묵직하고 고소한 맛을 선호하는 고객층입니다.' },
                    { value: 'trend', icon: '📸', title: '트렌디한 2030', desc: '새로운 맛과 디저트를 즐기며, 산미나 독특한 향미에도 거부감이 적은 고객층입니다.' },
                    { value: 'family', icon: '🏘️', title: '동네 주민 및 가족 단위', desc: '부드럽고 편안하게 마실 수 있는 마일드한 커피를 선호하는 고객층입니다.' }
                ]
            },
            {
                key: 'step2_dessert',
                stepText: 'QUESTION 02',
                progressText: 'STEP 2 / 4 : 디저트 페어링 분석',
                title: '매장의 주력 디저트는 어떤 종류인가요?',
                desc: '',
                nextLabel: '다음 단계로',
                options: [
                    { value: 'sweet', icon: '🍰', title: '달콤한 크림 / 초코류', desc: '단맛이 강해 커피의 묵직한 바디감이 필요한 메뉴입니다.' },
                    { value: 'bakery', icon: '🥐', title: '담백한 베이커리류', desc: '빵 본연의 고소함을 살려주는 깔끔한 커피가 어울립니다.' },
                    { value: 'coffee_only', icon: '☕', title: '커피 자체에 집중', desc: '디저트 비중이 낮아 커피의 고유 향미와 개성이 더 중요합니다.' }
                ]
            },
            {
                key: 'selectedFlavor',
                stepText: 'QUESTION 03',
                progressText: 'STEP 3 / 4 : 핵심 향미 설계',
                title: '우리 매장 커피의 첫입, 어떤 느낌이었으면 하시나요?',
                desc: '',
                nextLabel: '마지막 단계로',
                options: [
                    { value: 'nutty_medium', icon: '🍫', title: '호불호 없는 균형잡힌 표준 배합(클래식)', desc: '산미를 낮추고 고소함과 쌉싸름한 단맛이 오래 남는 스타일입니다.' },
                    { value: 'balanced', icon: '🍯', title: '은은한 과일의 단맛 (밸런스)', desc: '가벼운 산미와 캐러멜 단맛의 균형이 좋은 마일드한 스타일입니다.' },
                    { value: 'floral_acidity', icon: '🌸', title: '화사한 꽃향기와 쥬시함', desc: '베리류 산미와 꽃 향이 매력적인 트렌디 스페셜티 스타일입니다.' },
                    { value: 'decaf', icon: '🌙', title: '부담 없는 디카페인', desc: '밤에도 마실 수 있는 깔끔한 단맛 중심의 스타일입니다.' }
                ]
            },
            {
                key: 'step4_milk',
                stepText: 'QUESTION 04',
                progressText: 'STEP 4 / 4 : 최종 세팅 완료',
                title: '우유가 들어가는 메뉴의 비중은 어느 정도인가요?',
                desc: '라떼나 크림 커피에서도 커피의 맛이 묻히지 않도록 바디감을 조절합니다.',
                nextLabel: '맞춤 블렌드 분석하기',
                options: [
                    { value: 'americano_main', icon: '🧊', title: '아메리카노 위주', desc: '블랙으로 마셨을 때 가장 맛있는 포인트를 잡습니다.' },
                    { value: 'balance', icon: '🥛', title: '반반 (밸런스형)', desc: '라떼와 아메리카노 모두 어울리도록 밸런스를 맞춥니다.' },
                    { value: 'latte_main', icon: '☕', title: '라떼 / 크림 맛집', desc: '우유와 크림에서도 살아나는 진한 고소함이 필요합니다.' }
                ]
            }
        ];

        const labelMap = {
            office: '직장인', trend: '트렌디2030', family: '동네/가족',
            sweet: '달콤/크림', bakery: '담백/베이커리', coffee_only: '커피집중',
            nutty_medium: '다크/고소', balanced: '밸런스/마일드', floral_acidity: '산미/화사', decaf: '디카페인',
            americano_main: '아메리카노 위주', balance: '라떼 밸런스', latte_main: '라떼 위주',
            under_10: '10kg 미만', '10_to_30': '10~30kg', over_30: '30kg 이상'
        };

        const loadingLabelMap = {
            office: '📌 직장인 타겟', trend: '📌 트렌디 2030', family: '📌 동네상권/가족',
            sweet: '🍰 달콤한 디저트', bakery: '🥐 담백한 베이커리', coffee_only: '☕ 커피 집중',
            nutty_medium: '🍫 다크/고소함', balanced: '🍯 밸런스/마일드', floral_acidity: '🌸 산미/화사함', decaf: '🌙 디카페인',
            americano_main: '🧊 아메리카노 위주', balance: '🥛 라떼 밸런스', latte_main: '☕ 라떼/크림 위주',
            under_10: '📦 10kg 미만', '10_to_30': '📦 10~30kg', over_30: '📦 30kg 이상'
        };

        const loadingMessages = [
            '수집된 파라미터를 기반으로 생두 배합비를 계산 중입니다...',
            '디저트 페어링에 최적화된 바디감(Body)을 세팅 중입니다...',
            '우유 베리에이션에 따른 수율 및 배전도를 조정 중입니다...',
            '사장님 매장만의 시그니처 블렌드 설계가 완료되었습니다!'
        ];

        const state = {
            step1_target: appStore.get('step1_target', ''),
            step2_dessert: appStore.get('step2_dessert', ''),
            selectedFlavor: appStore.get('selectedFlavor', ''),
            step4_milk: appStore.get('step4_milk', ''),
            step4_volume: appStore.get('step4_volume', ''),
            lead_name: appStore.get('lead_name', ''),
            lead_phone: appStore.get('lead_phone', ''),
            lead_email: appStore.get('lead_email', ''),
            lead_address: appStore.get('lead_address', ''),
            lead_bizNum: appStore.get('lead_bizNum', '')
        };

        const GOOGLE_FORM_RESPONSE_URL = 'https://docs.google.com/forms/d/14sxVQ1dIzeyflM_93ysNevl2SWW3KboEOMRBe856XKo/formResponse';
        const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwi7fmwLSD7QwN7K-BBFGFcetwOcUc9oKMOHVQnM-_8k3oP7iEntelq_8K3zZxKypJA/exec';
        const MIN_LOADING_MS = 2600;
        const PREFETCH_TIMEOUT_MS = 5000;

        let stepIndex = 0;
        let viewState = 'survey';
        let percentIntervalId = null;
        let messageIntervalId = null;

        const surveyProgress = document.getElementById('surveyProgress');
        const surveyHeader = document.getElementById('surveyHeader');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const questionStep = document.getElementById('questionStep');
        const questionTitle = document.getElementById('questionTitle');
        const questionDesc = document.getElementById('questionDesc');
        const optionsContainer = document.getElementById('optionsContainer');
        const volumeSection = document.getElementById('volumeSection');
        const surveyNav = document.getElementById('surveyNav');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const statusEl = document.getElementById('submitStatus');

        const loadingView = document.getElementById('loadingView');
        const loadingText = document.getElementById('loadingText');
        const tagContainer = document.getElementById('tagContainer');
        const loadingPercent = document.getElementById('loadingPercent');

        const leadModal = document.getElementById('leadModal');
        const leadForm = document.getElementById('leadForm');

        function hasLeadData() {
            return !!(state.lead_name && state.lead_phone && state.lead_email && state.lead_address && state.lead_bizNum);
        }

        function setViewState(nextState) {
            viewState = nextState;
            const isSurvey = viewState === 'survey';
            surveyProgress.style.display = isSurvey ? '' : 'none';
            surveyHeader.style.display = isSurvey ? '' : 'none';
            optionsContainer.style.display = isSurvey ? '' : 'none';
            volumeSection.style.display = isSurvey && steps[stepIndex].key === 'step4_milk' ? 'block' : 'none';
            surveyNav.style.display = isSurvey ? 'flex' : 'none';
            statusEl.style.display = isSurvey ? '' : 'none';
            if (!isSurvey) {
                leadModal.classList.remove('show');
                loadingView.style.display = 'flex';
            } else {
                loadingView.style.display = 'none';
            }
        }

        function updateNextState() {
            const step = steps[stepIndex];
            const enabled = step.key === 'step4_milk'
                ? !!(state.step4_milk && state.step4_volume)
                : !!state[step.key];
            nextBtn.disabled = !enabled;
            nextBtn.classList.toggle('active', enabled);
        }

        function renderOptions(step) {
            optionsContainer.innerHTML = '';
            const selected = state[step.key];

            step.options.forEach(function (option) {
                const card = document.createElement('div');
                card.className = 'option-card clickable-card' + (selected === option.value ? ' selected' : '');
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.innerHTML = '<div class="option-icon">' + option.icon + '</div>' +
                    '<div class="option-title">' + option.title + '</div>' +
                    '<div class="option-desc">' + option.desc + '</div>';

                card.addEventListener('click', function () {
                    state[step.key] = option.value;
                    appStore.set(step.key, option.value);
                    renderStep();
                });

                card.addEventListener('keydown', function (event) {
                    onCardKeyActivate(event, function () {
                        state[step.key] = option.value;
                        appStore.set(step.key, option.value);
                        renderStep();
                    });
                });

                optionsContainer.appendChild(card);
            });
        }

        function renderVolumeButtons() {
            const buttons = document.querySelectorAll('.volume-btn');
            buttons.forEach(function (button) {
                const value = button.getAttribute('data-volume');
                button.classList.toggle('selected', state.step4_volume === value);
                button.onclick = function () {
                    state.step4_volume = value;
                    appStore.set('step4_volume', value);
                    buttons.forEach(function (btn) {
                        btn.classList.toggle('selected', btn.getAttribute('data-volume') === value);
                    });
                    updateNextState();
                };
            });
        }

        function renderStep() {
            const step = steps[stepIndex];
            progressFill.style.width = ((stepIndex + 1) * 25) + '%';
            progressText.textContent = step.progressText;
            questionStep.textContent = step.stepText;
            questionTitle.textContent = step.title;
            questionDesc.textContent = step.desc || '';
            nextBtn.textContent = step.nextLabel;

            renderOptions(step);
            volumeSection.style.display = step.key === 'step4_milk' ? 'block' : 'none';
            if (step.key === 'step4_milk') renderVolumeButtons();

            prevBtn.style.visibility = 'visible';
            statusEl.textContent = '';
            updateNextState();
        }

        function openLeadModal() {
            document.getElementById('userName').value = state.lead_name;
            document.getElementById('userPhone').value = state.lead_phone;
            document.getElementById('userEmail').value = state.lead_email;
            document.getElementById('businessAddress').value = state.lead_address;
            document.getElementById('businessNumber').value = state.lead_bizNum;
            leadModal.classList.add('show');
        }

        function closeLeadModal() {
            leadModal.classList.remove('show');
        }

        function populateLoadingTags() {
            tagContainer.innerHTML = '';
            [
                state.step1_target,
                state.step2_dessert,
                state.selectedFlavor,
                state.step4_milk,
                state.step4_volume
            ].forEach(function (value) {
                const text = loadingLabelMap[value];
                if (!text) return;
                const span = document.createElement('span');
                span.className = 'data-tag';
                span.textContent = text;
                tagContainer.appendChild(span);
            });
        }

        function fetchResultByFlavor(flavor) {
            return fetch(GOOGLE_APP_SCRIPT_URL + '?flavor=' + encodeURIComponent(flavor))
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    if (!data || !data.name) {
                        throw new Error('결과 데이터 형식이 올바르지 않습니다.');
                    }
                    return data;
                });
        }

        function withTimeout(promise, timeoutMs, message) {
            return Promise.race([
                promise,
                new Promise(function (_, reject) {
                    setTimeout(function () {
                        reject(new Error(message || '요청 시간이 초과되었습니다.'));
                    }, timeoutMs);
                })
            ]);
        }

        function clearLoadingTimers() {
            if (percentIntervalId) clearInterval(percentIntervalId);
            if (messageIntervalId) clearInterval(messageIntervalId);
            percentIntervalId = null;
            messageIntervalId = null;
        }

        function runLoadingAnimationUntilReady(readyPromise) {
            let percent = 0;
            let messageIndex = 0;
            let ready = false;

            loadingPercent.textContent = '0%';
            loadingText.textContent = loadingMessages[0];
            loadingText.classList.add('cursor');

            readyPromise.finally(function () {
                ready = true;
            });

            messageIntervalId = setInterval(function () {
                if (messageIndex >= loadingMessages.length - 2) return;
                messageIndex += 1;
                loadingText.style.opacity = 0;
                setTimeout(function () {
                    loadingText.textContent = loadingMessages[messageIndex];
                    loadingText.style.opacity = 1;
                }, 250);
            }, 1500);

            percentIntervalId = setInterval(function () {
                const ceiling = ready ? 100 : 92;
                percent = Math.min(ceiling, percent + Math.floor(Math.random() * 4) + 1);
                loadingPercent.textContent = percent + '%';

                if (ready && percent >= 100) {
                    clearLoadingTimers();
                    loadingText.textContent = loadingMessages[loadingMessages.length - 1];
                    loadingText.classList.remove('cursor');
                    setTimeout(function () {
                        window.location.href = 'result.html';
                    }, 650);
                }
            }, 70);
        }

        async function submitFinal() {
            const step1 = state.step1_target;
            const step2 = state.step2_dessert;
            const step3 = state.selectedFlavor;
            const step4Milk = state.step4_milk;
            const step4Vol = state.step4_volume;

            let matchedBlend = '매칭 오류(확인요망)';
            if (step3 === 'nutty_medium') matchedBlend = 'Type: 433 (고소한 커스텀)';
            else if (step3 === 'balanced') matchedBlend = 'Type: No.11 (밸런스 커스텀)';
            else if (step3 === 'floral_acidity') matchedBlend = 'Type: 프루티 (플로럴 커스텀)';
            else if (step3 === 'decaf') matchedBlend = 'Type: 디카페인 커스텀';

            const payload = new URLSearchParams();
            payload.append('entry.2053126920', state.lead_name || '미입력');
            payload.append('entry.2077498721', state.lead_phone || '미입력');
            payload.append('entry.725316730', state.lead_email || '미입력');
            payload.append('entry.1778650554', state.lead_address || '미입력');
            payload.append('entry.1355384766', state.lead_bizNum || '미입력');
            payload.append('entry.53119786', labelMap[step1] || step1);
            payload.append('entry.2138629377', labelMap[step2] || step2);
            payload.append('entry.1228411752', labelMap[step3] || step3);
            payload.append('entry.941053682', labelMap[step4Milk] || step4Milk);
            payload.append('entry.92871949', labelMap[step4Vol] || step4Vol);
            payload.append('entry.1716051107', matchedBlend);

            nextBtn.disabled = true;
            nextBtn.classList.remove('active');
            statusEl.textContent = '전송 중입니다...';

            try {
                await fetch(GOOGLE_FORM_RESPONSE_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: payload
                });

                appStore.clearLeadData();
                appStore.clearResultCache();
                statusEl.textContent = '';
                setViewState('loading');
                populateLoadingTags();

                const prefetchPromise = withTimeout(
                    fetchResultByFlavor(step3),
                    PREFETCH_TIMEOUT_MS,
                    '결과 선조회 시간 초과'
                )
                    .then(function (data) {
                        appStore.setPrefetchedResult(step3, data);
                    })
                    .catch(function (error) {
                        console.error('결과 선조회 실패:', error);
                    });

                const readyPromise = Promise.allSettled([
                    prefetchPromise,
                    new Promise(function (resolve) {
                        setTimeout(resolve, MIN_LOADING_MS);
                    })
                ]);

                runLoadingAnimationUntilReady(readyPromise);
            } catch (err) {
                console.error('설문 전송 실패:', err);
                statusEl.textContent = '전송에 실패했습니다. 잠시 후 다시 시도해 주세요.';
                updateNextState();
            }
        }

        prevBtn.addEventListener('click', function () {
            if (viewState !== 'survey') return;
            if (stepIndex > 0) {
                stepIndex -= 1;
                renderStep();
                return;
            }
            window.location.href = 'index.html';
        });

        nextBtn.addEventListener('click', function () {
            if (viewState !== 'survey' || nextBtn.disabled) return;

            if (stepIndex === 1 && !hasLeadData()) {
                openLeadModal();
                return;
            }

            if (stepIndex < steps.length - 1) {
                stepIndex += 1;
                renderStep();
                return;
            }

            submitFinal();
        });

        document.getElementById('modalCloseBtn').addEventListener('click', closeLeadModal);
        leadModal.addEventListener('click', function (event) {
            if (event.target === leadModal) closeLeadModal();
        });

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') closeLeadModal();
        });

        document.getElementById('businessNumber').addEventListener('input', function (event) {
            const value = event.target.value.replace(/[^0-9]/g, '');
            if (value.length <= 3) event.target.value = value;
            else if (value.length <= 5) event.target.value = value.slice(0, 3) + '-' + value.slice(3);
            else event.target.value = value.slice(0, 3) + '-' + value.slice(3, 5) + '-' + value.slice(5, 10);
        });

        leadForm.addEventListener('submit', function (event) {
            event.preventDefault();
            state.lead_name = document.getElementById('userName').value.trim();
            state.lead_phone = document.getElementById('userPhone').value.trim();
            state.lead_email = document.getElementById('userEmail').value.trim();
            state.lead_address = document.getElementById('businessAddress').value.trim();
            state.lead_bizNum = document.getElementById('businessNumber').value.trim();

            appStore.set('lead_name', state.lead_name);
            appStore.set('lead_phone', state.lead_phone);
            appStore.set('lead_email', state.lead_email);
            appStore.set('lead_address', state.lead_address);
            appStore.set('lead_bizNum', state.lead_bizNum);

            closeLeadModal();
            if (stepIndex < steps.length - 1) {
                stepIndex += 1;
                renderStep();
            }
        });

        const params = new URLSearchParams(window.location.search);
        const requestedStep = parseInt(params.get('step'), 10);
        if (!isNaN(requestedStep) && requestedStep >= 1 && requestedStep <= 4) {
            stepIndex = requestedStep - 1;
        }

        setViewState('survey');
        renderStep();
    </script>
</body>
</html>
